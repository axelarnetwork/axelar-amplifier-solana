name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0 or v2.0.0-anchor)'
        required: true
        type: string
      ref:
        description: 'Branch/ref to build from'
        required: false
        type: string
        default: 'main'
      is_anchor:
        description: 'Mark as Anchor build (auto-detected from tag suffix)'
        required: false
        type: boolean
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  detect-build-type:
    name: Detect Build Type
    runs-on: blacksmith-2vcpu-ubuntu-2204
    outputs:
      is_anchor: ${{ steps.detect.outputs.is_anchor }}
      build_type_label: ${{ steps.detect.outputs.build_type_label }}
      ref: ${{ steps.detect.outputs.ref }}
      version: ${{ steps.detect.outputs.version }}
      commit_hash: ${{ steps.get-commit-hash.outputs.hash }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit hash
        id: get-commit-hash
        run: echo "hash=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Detect build type from tag or inputs
        id: detect
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          REF="${{ github.event.inputs.ref || 'main' }}"
          IS_ANCHOR="${{ github.event.inputs.is_anchor }}"

          if [[ "$VERSION" =~ -anchor$ ]]; then
            IS_ANCHOR="true"
          fi

          if [ "$IS_ANCHOR" = "true" ]; then
            echo "is_anchor=true" >> $GITHUB_OUTPUT
            echo "build_type_label=Anchor" >> $GITHUB_OUTPUT
          else
            echo "is_anchor=false" >> $GITHUB_OUTPUT
            echo "build_type_label=Vanilla" >> $GITHUB_OUTPUT
          fi

          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  release-plz:
    name: Release with release-plz
    runs-on: blacksmith-2vcpu-ubuntu-2204
    needs: detect-build-type
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect-build-type.outputs.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build:
    name: Build Solana Programs for Release
    needs: [detect-build-type, release-plz]
    if: always() && (needs.release-plz.result == 'success' || needs.release-plz.result == 'skipped')
    uses: ./.github/workflows/release-reusable-build.yaml
    with:
      ref: ${{ needs.detect-build-type.outputs.ref }}
      is_anchor: ${{ needs.detect-build-type.outputs.is_anchor == 'true' }}
      update-ids: false
      commit-changes: false
    secrets: inherit

  upload-to-r2:
    name: Upload Release to R2 (${{ matrix.environment }})
    needs: [detect-build-type, build]
    strategy:
      matrix:
        environment:
          - devnet-amplifier
          - stagenet
          - testnet
          - mainnet
    uses: ./.github/workflows/release-reusable-upload.yaml
    with:
      version: ${{ needs.detect-build-type.outputs.version }}
      environment: ${{ matrix.environment }}
      artifact-name: ${{ needs.build.outputs.artifact-name }}
      artifact-path: ${{ needs.build.outputs.artifact-path }}
      is_anchor: ${{ needs.detect-build-type.outputs.is_anchor == 'true' }}
      ref: ${{ needs.detect-build-type.outputs.ref }}
      github-release: false
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      cf-endpoint-url: ${{ secrets.CF_ENDPOINT_URL }}
      cf-bucket-access-key-id: ${{ secrets.CF_BUCKET_ACCESS_KEY_ID }}
      cf-bucket-secret-access-key: ${{ secrets.CF_BUCKET_SECRET_ACCESS_KEY }}

  create-github-release:
    name: Create GitHub Release
    runs-on: blacksmith-2vcpu-ubuntu-2204
    needs: [detect-build-type, build, upload-to-r2]
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: release-artifacts

      - name: Generate release notes
        id: release-notes
        run: |
          VERSION="${{ needs.detect-build-type.outputs.version }}"
          BUILD_TYPE="${{ needs.detect-build-type.outputs.build_type_label }}"
          REF="${{ needs.detect-build-type.outputs.ref }}"
          COMMIT="${{ needs.detect-build-type.outputs.commit_hash }}"
          IS_ANCHOR="${{ needs.detect-build-type.outputs.is_anchor }}"

          if [ "$IS_ANCHOR" = "true" ]; then
            DEPLOY_CMD="anchor deploy"
            VERIFY_CMD="anchor verify"
          else
            DEPLOY_CMD="solana program deploy"
            VERIFY_CMD="solana-verify verify-from-repo"
          fi

          cat > release-notes.md << EOF
          ## Solana Program Release ${VERSION}

          **Build Type:** ${BUILD_TYPE} | **Branch:** \`${REF}\` | **Commit:** \`${COMMIT}\`

          Artifacts uploaded to: \`releases/solana/{environment}/${VERSION}/\`

          **Deployment:** \`${DEPLOY_CMD}\` | **Verification:** \`${VERIFY_CMD}\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.0.8
        with:
          files: |
            release-artifacts/*.so
            release-artifacts/*.json
          body_path: release-notes.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    name: Release Summary
    runs-on: blacksmith-2vcpu-ubuntu-2204
    needs: [detect-build-type, release-plz, build, upload-to-r2, create-github-release]
    if: always()
    steps:
      - name: Generate release summary
        run: |
          VERSION="${{ needs.detect-build-type.outputs.version }}"
          BUILD_TYPE="${{ needs.detect-build-type.outputs.build_type_label }}"
          COMMIT="${{ needs.detect-build-type.outputs.commit_hash }}"

          echo "## Release Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Build Type:** ${BUILD_TYPE}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ needs.detect-build-type.outputs.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${COMMIT}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Released to:" >> $GITHUB_STEP_SUMMARY
          echo "\`releases/solana/{environment}/${VERSION}/\`" >> $GITHUB_STEP_SUMMARY
