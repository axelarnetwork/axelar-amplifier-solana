name: Upload to R2

on:
  push:
    branches:
      - main
      - v2-anchor

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  detect-build-type:
    name: Detect Build Type
    runs-on: blacksmith-2vcpu-ubuntu-2204
    outputs:
      is_anchor: ${{ steps.detect.outputs.is_anchor }}
      build_type_label: ${{ steps.detect.outputs.build_type_label }}
      ref: ${{ steps.detect.outputs.ref }}
      commit_hash: ${{ steps.get-commit-hash.outputs.hash }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit hash
        id: get-commit-hash
        run: echo "hash=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Detect branch and build type
        id: detect
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          echo "Branch: $BRANCH_NAME"

          if [[ "$BRANCH_NAME" == "v2-anchor" ]]; then
            echo "is_anchor=true" >> $GITHUB_OUTPUT
            echo "build_type_label=Anchor" >> $GITHUB_OUTPUT
            echo "ref=v2-anchor" >> $GITHUB_OUTPUT
          else
            echo "is_anchor=false" >> $GITHUB_OUTPUT
            echo "build_type_label=Vanilla" >> $GITHUB_OUTPUT
            echo "ref=main" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build Solana Programs
    needs: detect-build-type
    uses: ./.github/workflows/release-reusable-build.yaml
    with:
      ref: ${{ needs.detect-build-type.outputs.ref }}
      is_anchor: ${{ needs.detect-build-type.outputs.is_anchor == 'true' }}
      update-ids: false
      commit-changes: false
    secrets: inherit

  upload-all-environments:
    name: Upload to R2 (${{ matrix.environment }})
    needs: [detect-build-type, build]
    strategy:
      matrix:
        environment:
          - devnet-amplifier
          - stagenet
          - testnet
          - mainnet
    uses: ./.github/workflows/release-reusable-upload.yaml
    with:
      version: ${{ needs.detect-build-type.outputs.commit_hash }}
      environment: ${{ matrix.environment }}
      artifact-name: ${{ needs.build.outputs.artifact-name }}
      artifact-path: ${{ needs.build.outputs.artifact-path }}
      is_anchor: ${{ needs.detect-build-type.outputs.is_anchor == 'true' }}
      ref: ${{ needs.detect-build-type.outputs.ref }}
      github-release: false
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      cf-endpoint-url: ${{ secrets.CF_ENDPOINT_URL }}
      cf-bucket-access-key-id: ${{ secrets.CF_BUCKET_ACCESS_KEY_ID }}
      cf-bucket-secret-access-key: ${{ secrets.CF_BUCKET_SECRET_ACCESS_KEY }}

  summary:
    name: Upload Summary
    runs-on: blacksmith-2vcpu-ubuntu-2204
    needs: [detect-build-type, upload-all-environments]
    if: always()
    steps:
      - name: Generate upload summary
        run: |
          VERSION="${{ needs.detect-build-type.outputs.commit_hash }}"
          BUILD_TYPE="${{ needs.detect-build-type.outputs.build_type_label }}"
          if [ "${{ needs.detect-build-type.outputs.is_anchor }}" = "true" ]; then
            VERSION="${VERSION}-anchor"
          fi

          echo "## Upload Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Type:** ${BUILD_TYPE}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ needs.detect-build-type.outputs.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ needs.detect-build-type.outputs.commit_hash }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts uploaded to:" >> $GITHUB_STEP_SUMMARY
          echo "\`releases/solana/{environment}/${VERSION}/\`" >> $GITHUB_STEP_SUMMARY
