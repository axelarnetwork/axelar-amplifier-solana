name: Release Upload to R2

on:
  push:
    branches:
      - main
      - v2-anchor

jobs:
  detect-build-type:
    name: Detect Build Type
    runs-on: ubuntu-latest
    outputs:
      is_anchor: ${{ steps.detect.outputs.is_anchor }}
      build_type_label: ${{ steps.detect.outputs.build_type_label }}
      ref: ${{ steps.detect.outputs.ref }}
    steps:
      - name: Detect branch and build type
        id: detect
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          echo "Branch: $BRANCH_NAME"

          if [[ "$BRANCH_NAME" == "v2-anchor" ]]; then
            echo "is_anchor=true" >> $GITHUB_OUTPUT
            echo "build_type_label=Anchor" >> $GITHUB_OUTPUT
            echo "ref=v2-anchor" >> $GITHUB_OUTPUT
          else
            echo "is_anchor=false" >> $GITHUB_OUTPUT
            echo "build_type_label=Vanilla" >> $GITHUB_OUTPUT
            echo "ref=main" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build Solana Programs
    needs: detect-build-type
    uses: ./.github/workflows/release-reusable-build.yaml
    with:
      ref: ${{ needs.detect-build-type.outputs.ref }}
      is_anchor: ${{ needs.detect-build-type.outputs.is_anchor == 'true' }}
      update-ids: false
      commit-changes: false
    secrets: inherit

  upload-all-environments:
    name: Upload to R2 (${{ matrix.environment }})
    needs: [detect-build-type, build]
    strategy:
      matrix:
        environment:
          - devnet-amplifier
          - stagenet
          - testnet
          - mainnet
    uses: ./.github/workflows/release-reusable-upload.yaml
    with:
      version: ${{ github.sha }}
      environment: ${{ matrix.environment }}
      artifact-name: solana-programs
      is_anchor: ${{ needs.detect-build-type.outputs.is_anchor == 'true' }}
      ref: ${{ needs.detect-build-type.outputs.ref }}
    secrets: inherit

  summary:
    name: Upload Summary
    runs-on: blacksmith-2vcpu-ubuntu-2204
    needs: [detect-build-type, upload-all-environments]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect-build-type.outputs.ref }}

      - name: Generate summary
        run: |
          VERSION="${{ github.sha }}"
          if [ "${{ needs.detect-build-type.outputs.is_anchor }}" = "true" ]; then
            VERSION="${VERSION}-anchor"
          fi
          echo "Artifacts uploaded to \`releases/solana/{environment}/$VERSION/\`" >> $GITHUB_STEP_SUMMARY
