name: Upload to R2

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  detect-build-type:
    name: Get Build Metadata
    runs-on: blacksmith-2vcpu-ubuntu-2204
    outputs:
      ref: ${{ steps.detect.outputs.ref }}
      commit_hash: ${{ steps.get-commit-hash.outputs.hash }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit hash
        id: get-commit-hash
        run: echo "hash=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set ref
        id: detect
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          echo "Branch: $BRANCH_NAME"
          echo "ref=$BRANCH_NAME" >> $GITHUB_OUTPUT

  build:
    name: Build Solana Programs
    needs: detect-build-type
    uses: ./.github/workflows/release-reusable-build.yaml
    with:
      ref: ${{ needs.detect-build-type.outputs.ref }}
      update-ids: false
      commit-changes: false
    secrets: inherit

  upload-all-environments:
    name: Upload to R2 (${{ matrix.environment }})
    needs: [detect-build-type, build]
    strategy:
      matrix:
        environment:
          - devnet-amplifier
          - stagenet
          - testnet
          - mainnet
    uses: ./.github/workflows/release-reusable-upload.yaml
    with:
      version: ${{ needs.detect-build-type.outputs.commit_hash }}
      environment: ${{ matrix.environment }}
      artifact-name: ${{ needs.build.outputs.artifact-name }}
      artifact-path: ${{ needs.build.outputs.artifact-path }}
      ref: ${{ needs.detect-build-type.outputs.ref }}
      github-release: false
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      cf-endpoint-url: ${{ secrets.CF_ENDPOINT_URL }}
      cf-bucket-access-key-id: ${{ secrets.CF_BUCKET_ACCESS_KEY_ID }}
      cf-bucket-secret-access-key: ${{ secrets.CF_BUCKET_SECRET_ACCESS_KEY }}

  summary:
    name: Upload Summary
    runs-on: blacksmith-2vcpu-ubuntu-2204
    needs: [detect-build-type, upload-all-environments]
    if: always()
    steps:
      - name: Generate upload summary
        run: |
          VERSION="${{ needs.detect-build-type.outputs.commit_hash }}"

          echo "## Upload Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ needs.detect-build-type.outputs.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ needs.detect-build-type.outputs.commit_hash }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts uploaded to:" >> $GITHUB_STEP_SUMMARY
          echo "\`releases/solana/{environment}/${VERSION}/\`" >> $GITHUB_STEP_SUMMARY
