name: "Build Solana Programs"

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout (branch, tag, or commit)'
        required: false
        type: string
        default: 'main'
      network:
        description: 'Network environment: devnet-amplifier, stagenet, testnet, or mainnet'
        required: false
        type: string
        default: ''
      update-ids:
        description: 'Whether to update program IDs'
        required: false
        type: boolean
        default: false
      commit-changes:
        description: 'Whether to commit ID changes back to repo'
        required: false
        type: boolean
        default: false
    outputs:
      artifact-name:
        description: 'Name of the uploaded artifact containing all builds'
        value: ${{ jobs.build.outputs.artifact-name }}
      artifact-path:
        description: 'Path of the uploaded artifact containing all builds'
        value: ${{ jobs.build.outputs.artifact-path }}
      ref-used:
        description: 'Git ref that was built'
        value: ${{ jobs.build.outputs.ref-used }}
      commit-hash:
        description: 'Commit hash that was built'
        value: ${{ jobs.build.outputs.commit-hash }}

env:
  BASE_IMAGE: ${{ vars.BASE_IMAGE }}

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    outputs:
      artifact-name: ${{ steps.set-artifact-name.outputs.name }}
      artifact-path: ${{ steps.set-artifact-name.outputs.path }}
      ref-used: ${{ steps.set-metadata.outputs.ref-used }}
      commit-hash: ${{ steps.get-commit-hash.outputs.hash }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Get commit hash
        id: get-commit-hash
        run: echo "hash=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set build metadata
        id: set-metadata
        run: |
          echo "ref-used=${{ inputs.ref }}" >> $GITHUB_OUTPUT

      - name: Set artifact name
        id: set-artifact-name
        run: |
          echo "name=solana-programs" >> $GITHUB_OUTPUT
          echo "path=target/deploy" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86.0

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install solana-verify
        run: cargo install solana-verify

      - name: Build xtask
        run: cargo build -p xtask

      - name: Update program IDs
        if: inputs.update-ids
        run: cargo xtask update-ids

      - name: Commit updated IDs
        if: inputs.update-ids && inputs.commit-changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update program IDs [skip ci]"
            git push
          fi

      - name: Build Solana programs
        run: |
          # Extract package names from release-plz.toml and build each one
          PROGRAMS=$(grep -A 4 '^\[\[package\]\]' release-plz.toml | grep '^name = ' | sed 's/name = "\(.*\)"/\1/')

          echo "Building programs from release-plz.toml:"
          echo "$PROGRAMS"
          echo ""

          for program in $PROGRAMS; do
            # Convert kebab-case to snake_case for library name
            library_name=$(echo "$program" | tr '-' '_')
            echo "Building $program (library: $library_name)..."
            solana-verify build --base-image $BASE_IMAGE --library-name $library_name
            echo "✅ $program built successfully"
            echo ""
          done

      - name: List build artifacts
        run: |
          echo "Build artifacts:"
          ls -lh target/deploy/
          echo "Keypair files:"
          ls -lh *.json || echo "No keypair files found in root"
          echo ""
          echo "Git ref: ${{ inputs.ref }}"

      - name: Create build metadata file
        run: |
          cat > build-metadata.json << EOF
          {
            "ref": "${{ inputs.ref }}",
            "commit_sha": "${{ github.sha }}",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cat build-metadata.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solana-programs
          path: |
            target/deploy/*.so
            *.json
            build-metadata.json
          retention-days: 90
