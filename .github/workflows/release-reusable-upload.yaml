name: Reusable Upload

on:
  workflow_call:
    inputs:
      version:
        description: 'Version identifier (e.g., v1.0.0 or commit hash)'
        required: true
        type: string
      environment:
        description: 'Environment: devnet-amplifier, stagenet, testnet, or mainnet'
        required: true
        type: string
      artifact-name:
        description: 'Name of the artifact to download'
        required: false
        type: string
        default: 'solana-programs'
      is_anchor:
        description: 'Whether this is an Anchor build'
        required: false
        type: boolean
        default: false
      ref:
        description: 'Git ref that was built'
        required: true
        type: string
        default: 'main'

env:
  CF_BUCKET_NAME: axelar-static
  CF_BUCKET_ROOT_KEY: releases/solana

jobs:
  upload:
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - name: Determine final version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          if [ "${{ inputs.is_anchor }}" = "true" ]; then
            # Add -anchor suffix if not already present
            if [[ ! "$VERSION" =~ -anchor$ ]]; then
              VERSION="${VERSION}-anchor"
            fi
          fi
          echo "final-version=$VERSION" >> $GITHUB_OUTPUT
          echo "Final version for upload: $VERSION"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f

      - name: Install AWS CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y awscli

      - name: Configure AWS CLI for Cloudflare R2
        run: |
          aws configure set aws_access_key_id ${{ secrets.CF_BUCKET_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.CF_BUCKET_SECRET_ACCESS_KEY }}
          aws configure set default.region auto

      - name: Upload to R2
        env:
          ENDPOINT_URL: ${{ secrets.CF_ENDPOINT_URL }}
        run: |
          TARGET_PATH="s3://${{ env.CF_BUCKET_NAME }}/${{ env.CF_BUCKET_ROOT_KEY }}/${{ inputs.environment }}/${{ steps.version.outputs.final-version }}"
          echo "Uploading to: $TARGET_PATH"
          echo "Build type: ${{ inputs.is_anchor && 'Anchor' || 'Vanilla' }}"

          # Upload all .so files
          if ls artifacts/*.so 1> /dev/null 2>&1; then
            for file in artifacts/*.so; do
              echo "Uploading $(basename $file)..."
              aws --endpoint-url="$ENDPOINT_URL" s3 cp "$file" "$TARGET_PATH/$(basename $file)" --no-progress
            done
          fi

          # Upload all .json keypair files (excluding build-metadata.json)
          if ls artifacts/*.json 1> /dev/null 2>&1; then
            for file in artifacts/*.json; do
              if [ "$(basename $file)" != "build-metadata.json" ]; then
                echo "Uploading $(basename $file)..."
                aws --endpoint-url="$ENDPOINT_URL" s3 cp "$file" "$TARGET_PATH/$(basename $file)" --no-progress
              fi
            done
          fi

      - name: List uploaded files
        env:
          ENDPOINT_URL: ${{ secrets.CF_ENDPOINT_URL }}
        run: |
          TARGET_PATH="s3://${{ env.CF_BUCKET_NAME }}/${{ env.CF_BUCKET_ROOT_KEY }}/${{ inputs.environment }}/${{ steps.version.outputs.final-version }}"
          echo "Files uploaded to R2:"
          aws --endpoint-url="$ENDPOINT_URL" s3 ls "$TARGET_PATH/" || echo "Could not list files"

      - name: Generate artifact manifest
        run: |
          echo "Generating artifact manifest..."

          # Read build metadata if it exists
          BUILD_TYPE="vanilla"
          BUILD_REF="${{ inputs.ref }}"
          COMMIT_SHA="${{ github.sha }}"
          if [ -f "artifacts/build-metadata.json" ]; then
            BUILD_TYPE=$(jq -r '.build_type // "vanilla"' artifacts/build-metadata.json)
            BUILD_REF=$(jq -r '.ref // "${{ inputs.ref }}"' artifacts/build-metadata.json)
            COMMIT_SHA=$(jq -r '.commit_sha // "${{ github.sha }}"' artifacts/build-metadata.json)
          elif [ "${{ inputs.is_anchor }}" = "true" ]; then
            BUILD_TYPE="anchor"
          fi

          # Check if any artifacts exist (excluding build-metadata.json)
          ARTIFACT_COUNT=$(find artifacts -name "*.so" -o \( -name "*.json" -a ! -name "build-metadata.json" \) | wc -l)
          if [ "$ARTIFACT_COUNT" -eq 0 ]; then
            echo "Error: No artifacts found to include in manifest"
            exit 1
          fi

          echo "Found $ARTIFACT_COUNT artifact(s) to include in manifest"
          echo "Build type: $BUILD_TYPE"

          cat > artifacts/manifest.json << EOF
          {
            "version": "${{ steps.version.outputs.final-version }}",
            "build_type": "$BUILD_TYPE",
            "branch": "$BUILD_REF",
            "ref": "$BUILD_REF",
            "environment": "${{ inputs.environment }}",
            "uploaded_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit_sha": "$COMMIT_SHA",
            "github_ref": "${{ github.ref }}",
            "artifacts": [
          $(find artifacts \( -name "*.so" -o \( -name "*.json" -a ! -name "build-metadata.json" \) \) | while read file; do
            echo "      \"$(basename $file)\","
          done | sed '$ s/,$//')
            ]
          }
          EOF
          cat artifacts/manifest.json

      - name: Upload manifest
        env:
          ENDPOINT_URL: ${{ secrets.CF_ENDPOINT_URL }}
        run: |
          TARGET_PATH="s3://${{ env.CF_BUCKET_NAME }}/${{ env.CF_BUCKET_ROOT_KEY }}/${{ inputs.environment }}/${{ steps.version.outputs.final-version }}"
          aws --endpoint-url="$ENDPOINT_URL" s3 cp artifacts/manifest.json "$TARGET_PATH/manifest.json" --no-progress
          echo ""
          echo "✅ Upload complete!"
          echo "Version: ${{ steps.version.outputs.final-version }}"
          echo "Build type: ${{ inputs.is_anchor && 'Anchor' || 'Vanilla' }}"
          echo "R2 path: ${{ env.CF_BUCKET_ROOT_KEY }}/${{ inputs.environment }}/${{ steps.version.outputs.final-version }}/"
