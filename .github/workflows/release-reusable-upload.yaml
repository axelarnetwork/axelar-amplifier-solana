name: Reusable Upload

on:
  workflow_call:
    inputs:
      version:
        description: 'Version identifier (e.g., v1.0.0 or commit hash)'
        required: true
        type: string
      environment:
        description: 'Environment: devnet-amplifier, stagenet, testnet, or mainnet'
        required: true
        type: string
      artifact-name:
        description: 'Name of the artifact to download'
        required: false
        type: string
        default: 'solana-programs'
      artifact-path:
        description: 'Path to download artifacts to'
        type: string
        required: false
        default: 'artifacts'
      ref:
        description: 'Git ref that was built'
        required: true
        type: string
        default: 'main'
      github-release:
        description: 'Whether to upload as a github release'
        type: boolean
        default: false

    secrets:
      github-token:
        description: 'The github token to use for release uploads'
        required: false
      cf-endpoint-url:
        description: 'The endpoint URL of the CF bucket'
        required: true
      cf-bucket-access-key-id:
        description: 'The CF bucket access key id'
        required: true
      cf-bucket-secret-access-key:
        description: 'The CF bucket secret access key'
        required: true

env:
  CF_BUCKET_NAME: axelar-static
  CF_BUCKET_ROOT_KEY: releases/solana

jobs:
  upload:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    steps:
      - name: Prepare cross-steps variables
        run: |
          VERSION="${{ inputs.version }}"
          BASE_ARTIFACTS_DIR="${{ inputs.artifact-path }}"
          ARTIFACT_NAME="axelar-amplifier-solana-programs-${VERSION}"
          BASE_ARTIFACTS_VERSIONED_DIR="$(dirname ${BASE_ARTIFACTS_DIR})/${ARTIFACT_NAME}"

          ARCHIVES_OUTPUT_DIR="${{ github.workspace }}/build/archives"
          ZIP_ARCHIVE_FILE="${ARCHIVES_OUTPUT_DIR}/${ARTIFACT_NAME}.zip"
          TAR_ARCHIVE_FILE="${ARCHIVES_OUTPUT_DIR}/${ARTIFACT_NAME}.tar.gz"

          # Ensures that this dir is created
          mkdir -p ${ARCHIVES_OUTPUT_DIR}

          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "BASE_ARTIFACTS_DIR=${BASE_ARTIFACTS_DIR}" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV
          echo "BASE_ARTIFACTS_VERSIONED_DIR=${BASE_ARTIFACTS_VERSIONED_DIR}" >> $GITHUB_ENV
          echo "ARCHIVES_OUTPUT_DIR=${ARCHIVES_OUTPUT_DIR}" >> $GITHUB_ENV
          echo "ZIP_ARCHIVE_FILE=${ZIP_ARCHIVE_FILE}" >> $GITHUB_ENV
          echo "TAR_ARCHIVE_FILE=${TAR_ARCHIVE_FILE}" >> $GITHUB_ENV

          echo "Final version for upload: ${VERSION}"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ env.BASE_ARTIFACTS_DIR }}

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          find ${{ env.BASE_ARTIFACTS_DIR }} -type f

      - name: Verify required tools are installed
        run: |
          aws --version
          jq --version
          zip --version
          tar --version
          sha256sum --version

      - name: Create `zip` and `tar` archive files
        run: |
          # Renaming to keep the dir structure in the archive matching the release version
          mv ${{ env.BASE_ARTIFACTS_DIR }} ${{ env.BASE_ARTIFACTS_VERSIONED_DIR }}

          # This cd to keep the dir structure of the artifacts archive
          cd ${{ env.BASE_ARTIFACTS_VERSIONED_DIR }}

          # Archive the program binaries (.so files)
          find "." -type f -name "*.so" -maxdepth 1 -print | zip "${{ env.ZIP_ARCHIVE_FILE }}" -@
          find "." -type f -name "*.so" -maxdepth 1 -print | tar -czvf "${{ env.TAR_ARCHIVE_FILE }}" -T -

          # Generate SHA-256 Checksums
          for file in "${{ env.TAR_ARCHIVE_FILE }}" "${{ env.ZIP_ARCHIVE_FILE }}"; do
            sha256sum "$file" > "$file.sha256"
          done

      - name: Publish program binaries to CF R2
        id: publish-to-r2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.cf-bucket-access-key-id }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.cf-bucket-secret-access-key }}
          AWS_DEFAULT_REGION: auto
          ENDPOINT_URL: ${{ secrets.cf-endpoint-url }}
        run: |
          CF_PROGRAMS_BUCKET_ROOT_KEY="${{ env.CF_BUCKET_ROOT_KEY }}/${{ inputs.environment }}/${{ env.VERSION }}/programs"
          PROGRAM_FILES=$(find "${{ env.BASE_ARTIFACTS_VERSIONED_DIR }}" -maxdepth 1 -type f -name "*.so")

          if [ -z "$PROGRAM_FILES" ]; then
            echo "Error: No .so files found to upload!"
            exit 1
          fi

          printf '%s\n' "$PROGRAM_FILES" | while IFS= read -r program_file; do
            echo "Uploading program file: ${program_file}"
            if [[ -f "$program_file" ]]; then
              FILE_KEY=$(echo $program_file | sed "s|^${{ env.BASE_ARTIFACTS_VERSIONED_DIR }}/||")
              echo "Uploading program file key: $CF_PROGRAMS_BUCKET_ROOT_KEY/$FILE_KEY"
              aws s3api put-object --bucket ${{ env.CF_BUCKET_NAME }} --key "$CF_PROGRAMS_BUCKET_ROOT_KEY/$FILE_KEY" --body "$program_file" --acl public-read --endpoint-url $ENDPOINT_URL
            fi
          done

          # Upload keypair files (excluding build-metadata.json and manifest.json)
          CF_KEYPAIRS_BUCKET_ROOT_KEY="${{ env.CF_BUCKET_ROOT_KEY }}/${{ inputs.environment }}/${{ env.VERSION }}/keypairs"
          KEYPAIR_FILES=$(find "${{ env.BASE_ARTIFACTS_VERSIONED_DIR }}" -maxdepth 1 -type f -name "*.json" ! -name "build-metadata.json" ! -name "manifest.json")

          if [ -n "$KEYPAIR_FILES" ]; then
            printf '%s\n' "$KEYPAIR_FILES" | while IFS= read -r keypair_file; do
              echo "Uploading keypair file: ${keypair_file}"
              if [[ -f "$keypair_file" ]]; then
                FILE_KEY=$(echo $keypair_file | sed "s|^${{ env.BASE_ARTIFACTS_VERSIONED_DIR }}/||")
                echo "Uploading keypair file key: $CF_KEYPAIRS_BUCKET_ROOT_KEY/$FILE_KEY"
                aws s3api put-object --bucket ${{ env.CF_BUCKET_NAME }} --key "$CF_KEYPAIRS_BUCKET_ROOT_KEY/$FILE_KEY" --body "$keypair_file" --acl public-read --endpoint-url $ENDPOINT_URL
              fi
            done
          fi

          # Upload the previously created archives to R2
          CF_ARCHIVES_BUCKET_ROOT_KEY="${{ env.CF_BUCKET_ROOT_KEY }}/${{ inputs.environment }}/${{ env.VERSION }}/archives"

          for file in "${{ env.TAR_ARCHIVE_FILE }}" "${{ env.ZIP_ARCHIVE_FILE }}"; do
            FILE_NAME=$(basename "${file}")
            echo "Uploading archive: ${FILE_NAME}"
            aws s3api put-object --bucket ${{ env.CF_BUCKET_NAME }} --key "$CF_ARCHIVES_BUCKET_ROOT_KEY/$FILE_NAME" --body "$file" --acl public-read --endpoint-url $ENDPOINT_URL
            aws s3api put-object --bucket ${{ env.CF_BUCKET_NAME }} --key "$CF_ARCHIVES_BUCKET_ROOT_KEY/$FILE_NAME.sha256" --body "$file.sha256" --acl public-read --endpoint-url $ENDPOINT_URL
          done

          # Convert list to a compacted JSON array output
          echo program_files=$(echo "${PROGRAM_FILES}" | jq -R . | jq -s . | jq -c .) >> "$GITHUB_OUTPUT"

      - name: Generate artifact manifest
        run: |
          echo "Generating artifact manifest..."

          # Read build metadata if it exists
          BUILD_REF="${{ inputs.ref }}"
          COMMIT_SHA="${{ github.sha }}"
          if [ -f "${{ env.BASE_ARTIFACTS_VERSIONED_DIR }}/build-metadata.json" ]; then
            BUILD_REF=$(jq -r '.ref // "${{ inputs.ref }}"' ${{ env.BASE_ARTIFACTS_VERSIONED_DIR }}/build-metadata.json)
            COMMIT_SHA=$(jq -r '.commit_sha // "${{ github.sha }}"' ${{ env.BASE_ARTIFACTS_VERSIONED_DIR }}/build-metadata.json)
          fi

          # Check if any artifacts exist (excluding build-metadata.json)
          ARTIFACT_COUNT=$(find ${{ env.BASE_ARTIFACTS_VERSIONED_DIR }} \( -name "*.so" -o \( -name "*.json" -a ! -name "build-metadata.json" -a ! -name "manifest.json" \) \) | wc -l)
          if [ "$ARTIFACT_COUNT" -eq 0 ]; then
            echo "Error: No artifacts found to include in manifest"
            exit 1
          fi

          echo "Found $ARTIFACT_COUNT artifact(s) to include in manifest"

          cat > ${{ env.BASE_ARTIFACTS_VERSIONED_DIR }}/manifest.json << EOF
          {
            "version": "${{ env.VERSION }}",
            "branch": "$BUILD_REF",
            "ref": "$BUILD_REF",
            "environment": "${{ inputs.environment }}",
            "uploaded_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit_sha": "$COMMIT_SHA",
            "github_ref": "${{ github.ref }}",
            "artifacts": [
          $(find ${{ env.BASE_ARTIFACTS_VERSIONED_DIR }} \( -name "*.so" -o \( -name "*.json" -a ! -name "build-metadata.json" -a ! -name "manifest.json" \) \) | while read file; do
            echo "      \"$(basename $file)\","
          done | sed '$ s/,$//')
            ]
          }
          EOF
          cat ${{ env.BASE_ARTIFACTS_VERSIONED_DIR }}/manifest.json

      - name: Upload manifest
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.cf-bucket-access-key-id }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.cf-bucket-secret-access-key }}
          AWS_DEFAULT_REGION: auto
          ENDPOINT_URL: ${{ secrets.cf-endpoint-url }}
        run: |
          CF_MANIFEST_KEY="${{ env.CF_BUCKET_ROOT_KEY }}/${{ inputs.environment }}/${{ env.VERSION }}/manifest.json"
          echo "Uploading manifest to: $CF_MANIFEST_KEY"
          aws s3api put-object --bucket ${{ env.CF_BUCKET_NAME }} --key "$CF_MANIFEST_KEY" --body "${{ env.BASE_ARTIFACTS_VERSIONED_DIR }}/manifest.json" --acl public-read --endpoint-url $ENDPOINT_URL
          echo ""
          echo "✅ Upload complete!"
          echo "Version: ${{ env.VERSION }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "R2 path: ${{ env.CF_BUCKET_ROOT_KEY }}/${{ inputs.environment }}/${{ env.VERSION }}/"

      - name: Update the GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.0.8
        if: inputs.github-release
        with:
          tag_name: ${{ env.VERSION }}
          files: |
            ${{ env.TAR_ARCHIVE_FILE }}
            ${{ env.TAR_ARCHIVE_FILE }}.sha256
            ${{ env.ZIP_ARCHIVE_FILE }}
            ${{ env.ZIP_ARCHIVE_FILE }}.sha256
            ${{ join(fromJson(steps.publish-to-r2.outputs.program_files), '\n') }}
        env:
          GITHUB_TOKEN: ${{ secrets.github-token }}
