name: Dry-Run Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/ref to test'
        required: false
        type: string
        default: 'main'

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  dry-run-build:
    name: Dry-Run Build
    runs-on: blacksmith-4vcpu-ubuntu-2204

    outputs:
      commit_hash: ${{ steps.get-commit-hash.outputs.hash }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Get commit hash
        id: get-commit-hash
        run: echo "hash=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86.0

      - name: Dry-run release-plz
        id: dry-run-release
        uses: MarcoIeni/release-plz-action@fff938ea2923fdfa35797fff63537b00f30fe6f9 # v0.5.82
        with:
          command: release --dry-run
          version: "0.3.105"
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Build programs
        run: |
          cargo build -p xtask
          cargo xtask build

      - name: Validate build outputs
        run: |
          PROGRAMS=(
            "axelar_solana_gateway"
            "axelar_solana_its"
            "axelar_solana_gas_service"
            "axelar_solana_multicall"
            "axelar_solana_memo_program"
            "axelar_solana_governance"
          )

          for program in "${PROGRAMS[@]}"; do
            if [ ! -f "target/deploy/${program}.so" ]; then
              echo "❌ Error: ${program}.so not found!"
              exit 1
            fi
            echo "✅ ${program}.so validated"
          done

      - name: Generate dry-run report
        run: |
          echo "## Dry-Run Build Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ inputs.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ steps.get-commit-hash.outputs.hash }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Build successful. Would upload to:" >> $GITHUB_STEP_SUMMARY
          echo "\`releases/solana/{environment}/{version}/\`" >> $GITHUB_STEP_SUMMARY
