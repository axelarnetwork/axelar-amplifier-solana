name: Release Dry-Run

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/ref to test'
        required: false
        type: string
        default: 'main'
      is_anchor:
        description: 'Mark as Anchor build'
        required: false
        type: boolean
        default: false

jobs:
  dry-run-build:
    name: Dry Run Build
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.85.1

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: Build programs
        run: |
          cargo build -p xtask
          cargo xtask build

      - name: Generate dry run report
        run: |
          VERSION_SUFFIX=""
          if [ "${{ inputs.is_anchor }}" = "true" ] || [[ "${{ inputs.ref }}" == "v2-anchor" ]]; then
            VERSION_SUFFIX="-anchor"
          fi
          echo "Build successful. Would upload to \`releases/solana/{environment}/{version}${VERSION_SUFFIX}/\`" >> $GITHUB_STEP_SUMMARY

      - name: Validate build outputs
        run: |
          PROGRAMS=(
            "axelar_solana_gateway"
            "axelar_solana_its"
            "axelar_solana_gas_service"
            "axelar_solana_multicall"
            "axelar_solana_memo_program"
            "axelar_solana_governance"
          )

          for program in "${PROGRAMS[@]}"; do
            if [ ! -f "target/deploy/${program}.so" ]; then
              echo "❌ Error: ${program}.so not found!"
              exit 1
            fi
          done
