name: Release PR

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch to create release from (main for Vanilla, v2-anchor for Anchor)'
        required: false
        type: string
        default: 'main'

permissions:
  pull-requests: write
  contents: write

jobs:
  release-pr:
    name: Create Release PR with release-plz
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: PR Creation Summary
        run: |
          BUILD_TYPE="Vanilla"
          if [[ "${{ inputs.ref }}" == "v2-anchor" ]]; then
            BUILD_TYPE="Anchor"
          fi

          echo "## Release PR Creation Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Type:** $BUILD_TYPE" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ inputs.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "A release PR has been created (or updated) with the following:" >> $GITHUB_STEP_SUMMARY
          echo "- Updated CHANGELOGs for modified packages" >> $GITHUB_STEP_SUMMARY
          echo "- Version bumps based on conventional commits" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Review and merge the PR to trigger the release workflow." >> $GITHUB_STEP_SUMMARY
