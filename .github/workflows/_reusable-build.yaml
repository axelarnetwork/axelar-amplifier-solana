name: Reusable Build

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout (branch, tag, or commit)'
        required: false
        type: string
        default: 'main'
      is_anchor:
        description: 'Whether this is an Anchor build'
        required: false
        type: boolean
        default: false
      network:
        description: 'Network environment: devnet-amplifier, stagenet, testnet, or mainnet'
        required: false
        type: string
        default: ''
      update-ids:
        description: 'Whether to update program IDs'
        required: false
        type: boolean
        default: false
      commit-changes:
        description: 'Whether to commit ID changes back to repo'
        required: false
        type: boolean
        default: false
    outputs:
      artifacts-path:
        description: 'Path to build artifacts'
        value: 'target/deploy'
      build-type:
        description: 'Build type (vanilla or anchor)'
        value: ${{ jobs.build.outputs.build-type }}
      ref-used:
        description: 'Git ref that was built'
        value: ${{ jobs.build.outputs.ref-used }}

env:
  BASE_IMAGE: ${{ vars.BASE_IMAGE }}

jobs:
  build:
    runs-on: blacksmith-2vcpu-ubuntu-2204
    outputs:
      build-type: ${{ steps.set-metadata.outputs.build-type }}
      ref-used: ${{ steps.set-metadata.outputs.ref-used }}
    steps:
      - name: Set build metadata
        id: set-metadata
        run: |
          if [ "${{ inputs.is_anchor }}" = "true" ]; then
            echo "build-type=anchor" >> $GITHUB_OUTPUT
          else
            echo "build-type=vanilla" >> $GITHUB_OUTPUT
          fi
          echo "ref-used=${{ inputs.ref }}" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install solana-verify
        run: |
          cargo install solana-verify

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: Build xtask
        run: cargo build -p xtask

      - name: Update program IDs
        if: inputs.update-ids
        run: cargo xtask update-ids

      - name: Commit updated IDs
        if: inputs.update-ids && inputs.commit-changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update program IDs [skip ci]"
            git push
          fi

      - name: Build axelar-solana-gateway
        run: |
          solana-verify build --base-image $BASE_IMAGE --library-name axelar_solana_gateway

      - name: Build axelar-solana-its
        run: |
          solana-verify build --base-image $BASE_IMAGE --library-name axelar_solana_its

      - name: Build axelar-solana-gas-service
        run: |
          solana-verify build --base-image $BASE_IMAGE --library-name axelar_solana_gas_service

      - name: Build axelar-solana-multicall
        run: |
          solana-verify build --base-image $BASE_IMAGE --library-name axelar_solana_multicall

      - name: Build axelar-solana-memo-program
        run: |
          solana-verify build --base-image $BASE_IMAGE --library-name axelar_solana_memo_program

      - name: Build axelar-solana-governance
        run: |
          solana-verify build --base-image $BASE_IMAGE --library-name axelar_solana_governance

      - name: List build artifacts
        run: |
          echo "Build artifacts:"
          ls -lh target/deploy/
          echo "Keypair files:"
          ls -lh *.json || echo "No keypair files found in root"
          echo ""
          echo "Build type: ${{ inputs.is_anchor && 'Anchor' || 'Vanilla' }}"
          echo "Git ref: ${{ inputs.ref }}"

      - name: Create build metadata file
        run: |
          cat > build-metadata.json << EOF
          {
            "build_type": "${{ inputs.is_anchor && 'anchor' || 'vanilla' }}",
            "ref": "${{ inputs.ref }}",
            "commit_sha": "${{ github.sha }}",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cat build-metadata.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solana-programs
          path: |
            target/deploy/*.so
            *.json
            build-metadata.json
          retention-days: 90

