[workspace]
allow_dirty = false
changelog_update = true
dependencies_update = false
git_release_enable = true
git_tag_enable = true
pr_branch_prefix = "release-"
pr_labels = ["release"]
publish_allow_dirty = false
publish_no_verify = false
semver_check = true
publish_timeout = "10m"
publish = false
release = true

pr_body = """
{% for release in releases %}
{% if release.title %}
### {{release.title}}
{% endif %}
Package: {{release.package}} {{release.previous_version}} -> {{release.next_version}}
{% if release.changelog %}
Changes:
{{release.changelog}}
{% endif %}
{% endfor -%}
"""

[[package]]
name = "axelar-solana-gas-service"
changelog_path = "CHANGELOG.md"
changelog_update = true
publish_all_features = true
git_release_enable = true
publish = false

[[package]]
name = "axelar-solana-gateway"
changelog_path = "CHANGELOG.md"
changelog_update = true
publish_all_features = true
git_release_enable = true
publish = false

[[package]]
name = "axelar-solana-governance"
changelog_path = "CHANGELOG.md"
changelog_update = true
publish_all_features = true
